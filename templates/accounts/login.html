{% extends 'base.html' %}
{% load static %}

<title>{% block title %} Arsha - Log In  {% endblock %}</title>

{% block main %}

<div class="container min-vh-100 d-flex align-items-center">

    <div class="row justify-content-center align-items-center w-100 g-5">

        <!-- Sign Up Card -->
        <div class="col-lg-5 col-md-6">

            <div class="card border-0 shadow-lg rounded-4 p-5">

                <h2 class="fw-bold text-center mb-2">
                    Log In
                </h2>

                <p class="text-center text-secondary mb-4">
                    Welcome back!
                </p>

                <form action="{% url 'accounts:login' %}" method="post">

                    {% csrf_token %}

                    <div class="input-group input-group-lg mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text"
                            class="form-control"
                            name="username"
                            placeholder="Username or Email">
                    </div>

                    <div class="input-group input-group-lg mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password"
                            class="form-control"
                            name="password"
                            placeholder="Password">
                    </div>

                    <button class="btn btn-primary btn-lg w-100 rounded-3">
                        Log In
                    </button>

                </form>

                <hr class="my-4">

                <p class="text-center text-secondary mb-0">
                    Do not have an account?
                    <a href="{% url 'accounts:signup' %}"
                       class="fw-semibold text-decoration-none">
                        Sign Up
                    </a>
                </p>

                <p class="text-center text-secondary mb-0">
                    Forgot Password?
                    <a href="{% url 'accounts:forgot-password' %}"
                       class="fw-semibold text-decoration-none">
                        Reset your password
                    </a>
                </p>

            </div>

        </div>

        <!-- Right Side -->
        <div class="col-lg-5 d-none d-lg-flex justify-content-center">

            <img src="{% static 'assets/img/hero-img.png' %}"
                 class="img-fluid"
                 style="max-height:500px;"
                 alt="Illustration">

        </div>

    </div>

</div>

{% endblock %}
